# ==============================================================================
# CONFIGURAZIONE ACQUISIZIONE DATASET - SynDataToolbox
# ==============================================================================
# Formato: parametro = valore
# Lascia vuoto per usare il valore di default.
# Linee che iniziano con '#' sono commenti e vengono ignorate.
# ==============================================================================


# --- GRIGLIA (solo Modalità Grid) -------------------------------------------

# Numero di cubetti per la griglia
num_cubes = 125


# --- INTENSITÀ LUCE ----------------------------------------------------------

# Intensità minima spotlight (lux)
intensity_min = 1000.0

# Intensità massima spotlight (lux)
intensity_max = 15000.0

# Incremento intensità tra uno scatto e il successivo
intensity_step = 2000.0


# --- COLORI LUCE -------------------------------------------------------------
# Inserisci uno o più indici separati da virgola.
# 1=Bianco, 2=Rosso, 3=Blu, 4=Verde, 5=Giallo,
# 6=Magenta, 7=Ciano, 8=Arancione, 9=Viola, 10=Rosa
colors = 1


# --- RAGGIO ATTENUAZIONE -----------------------------------------------------

# Raggio minimo (cm)
radius_min = 300.0

# Raggio massimo (cm)
radius_max = 300.0

# Incremento raggio
radius_step = 300.0


# --- ANGOLI CONO SPOTLIGHT ---------------------------------------------------

# Inner Cone Angle: valore fisso o intervallo (min,max,step)
# Esempi:
#   inner_cone = 10.0          -> valore fisso
#   inner_cone = 5.0,20.0,5.0  -> intervallo da 5 a 20 step 5
inner_cone = 20.0

# Outer Cone Angle: valore fisso o intervallo (min,max,step)
outer_cone = 40.0


# --- DIREZIONE SPOTLIGHT -----------------------------------------------------
# Preset: a=Verso il basso, b=Orizzontale, c=Verso l'alto,
#         d=Diagonale destra, e=Diagonale sinistra, f=Personalizzato
spotlight_direction = a

# (Solo se spotlight_direction = f)
spotlight_pitch = 0.0
spotlight_yaw   = 0.0


# --- ROTAZIONI CAMERA (solo Modalità Grid) -----------------------------------
# Modalità: preset oppure lookat
#   preset = usa i preset sotto
#   lookat  = la camera punta sempre il Punto di Interesse
camera_rotation_mode = preset

# Preset rotazioni (separati da virgola): a,b,c,d,e,f
# a=Frontale, b=Frontale+Laterali(±45°), c=Alto Frontale(+45°),
# d=Alto Completo, e=Basso Frontale(-45°), f=Basso Completo
rotation_presets = b
